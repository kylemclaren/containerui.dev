server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-built assets; fall back to a 404 page for unknown routes.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long-cache Astro's fingerprinted assets.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
